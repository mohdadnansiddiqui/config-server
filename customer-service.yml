server:
  port: 8082

spring:
  
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/ecommerce_customer
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  kafka:
    bootstrap-servers:
    - localhost:9092
    consumer:
      group-id: customer-create-group
      auto-offset-reset: earliest

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: ${JWT_SECRET:ZWNvbW1lcmNlLW1pY3Jvc2VydmljZXMtamF2YS0yMS1zcHJpbmctYm9vdC0zLWp3dC1zaGFyZWQtc2VjcmV0LWtleS0yMDI2}
    access-token-minutes: 30
    refresh-token-days: 7

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
